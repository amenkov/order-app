<html>

<head>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Smythe&display=swap" rel="stylesheet">
</head>

<body>
    <div class="main" id="main">
        <header>
            <img id="logo" src="./images/logo.png">
        </header>
        <div class="orders" id="orders"></div>
        <div class="receipt hidden" id="receipt">
            <h2>Your order</h2>
        </div>
        <dialog class="form-checkout" id="form-checkout">
        <form  method="dialog">
            <p2 class="form-summary">Enter card details</p2>
            <input class="form-input" type="text" required="true" id="name"  placeholder="Enter your name">
            <input class="form-input" type="text" required="true" id="cardNumber" placeholder="Enter card number">
            <input class="form-input" type="text" required="true" id="cvv" placeholder="Enter CVV">
            <button class="btn pay-btn" id="pay-btn">Pay</button>
        </form>
        </dialog>
        <div class="thanks" id="thanks">
        </div>
    <script src="index.js" type="module"></script>
</body>

</html>
